name: Build

on:
  push:
    branches: [main, master]
  pull_request:

env:
  NODE_VERSION: "26"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run build
