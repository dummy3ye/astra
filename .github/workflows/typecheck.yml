name: TypeCheck

on:
  push:
    branches: [main, master]
  pull_request:

env:
  NODE_VERSION: "26"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build -w @astra/shared
      - run: tsc --noEmit -p packages/bot/tsconfig.json
      - run: tsc --noEmit -p packages/dashboard/tsconfig.json
      - run: tsc --noEmit -p packages/dashboard/tsconfig.api.json
