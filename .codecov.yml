coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 5%
    patch:
      default:
        target: 80%
  precision: 2
  round: down
  range: "70...100"
ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/*.d.ts"
  - "**/tests/**"
  - "packages/dashboard/**"  # dashboard has no tests yet
comment:
  layout: "header, diff, files"
  behavior: default
